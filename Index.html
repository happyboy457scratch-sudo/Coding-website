<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Black Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="signinPrompt" class="overlay" role="dialog" aria-modal="true" aria-labelledby="promptTitle">
      <div class="panel">
        <button id="closePromptBtn" class="close" type="button" aria-label="Close sign in prompt">✕</button>
        <h2 id="promptTitle">Sign in to unlock full access</h2>
        <p>Guests can use the editor for 10 minutes. AI tools require signing in.</p>
        <button id="openLoginBtn" class="mint-btn" type="button">Sign in / Create account</button>
      </div>
    </div>

    <div id="authModal" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <div class="panel auth-panel">
        <button id="closeAuthBtn" class="close" type="button" aria-label="Close login">✕</button>
        <h2 id="authTitle">Login System (Local Demo)</h2>
        <form id="authForm">
          <label>Email</label>
          <input id="emailInput" required type="email" placeholder="you@example.com" />
          <label>Password</label>
          <input id="passwordInput" required type="password" minlength="4" placeholder="••••" />
          <label>Plan</label>
          <select id="planSelect">
            <option value="free">Free (7 AI credits/month)</option>
            <option value="premium">Premium $3.99 — Not available yet</option>
            <option value="ultimate">Premium Ultimate $7.99 — Not available yet</option>
          </select>
          <button class="mint-btn" type="submit">Sign in</button>
        </form>
      </div>
    </div>

    <div class="app">
      <header class="topbar">
        <h1>Work.py</h1>
        <div class="status-row">
          <span id="sessionStatus">Guest mode</span>
          <span id="usageStatus">Guest time left: 10:00</span>
          <span id="creditStatus">AI credits: 0</span>
          <button id="loginBtn" class="mint-btn" type="button">Login</button>
          <button id="logoutBtn" class="mint-btn hidden" type="button">Logout</button>
        </div>
      </header>

      <main class="layout">
        <section class="controls">
          <select id="languageSelect" aria-label="language">
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="typescript">TypeScript</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="java">Java</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="go">Go</option>
            <option value="rust">Rust</option>
            <option value="php">PHP</option>
            <option value="ruby">Ruby</option>
            <option value="swift">Swift</option>
            <option value="kotlin">Kotlin</option>
            <option value="bash">Bash</option>
            <option value="text">Plain Text</option>
          </select>
          <input id="fileName" value="main" aria-label="file name" />
          <select id="fileExt" aria-label="file format"></select>
          <button id="runBtn" class="mint-btn" type="button">Run</button>
          <button id="downloadBtn" class="mint-btn" type="button">Download</button>
          <button id="uploadBtn" class="mint-btn" type="button">Upload</button>
          <input id="uploadInput" type="file" hidden />
        </section>

        <section class="editor-area">
          <h3>Code Editor</h3>
          <textarea id="editor" spellcheck="false"></textarea>
        </section>

        <section class="terminal-area">
          <h3>Built-in Terminal</h3>
          <pre id="terminal">Terminal ready.</pre>
        </section>

        <section class="ai-area">
          <h3>AI Bug Helper</h3>
          <p>AI is available only for signed-in users.</p>
          <textarea id="aiPrompt" placeholder="Ask AI to fix a bug..."></textarea>
          <div class="ai-actions">
            <button id="askAiBtn" class="mint-btn" type="button">Ask AI</button>
            <button id="fixAiBtn" class="mint-btn" type="button">Auto-fix code</button>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
